name: Refresh audit (daily join)

# The CHEAP daily half of the split: re-read the committed Lean audit feeds and
# refresh the join (erdos + FC + proof status + wiki + signed verdicts). It does
# NOT rebuild or re-audit Lean proofs — that heavy step is audit-proofs.yml, run
# when the proof corpora change.
on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize with audit-proofs.yml: both commit to main, so never run them
# concurrently (a queued run waits rather than racing the push).
concurrency:
  group: commit-to-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - name: Test
        run: uv run pytest
      - name: Regenerate the join
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python erdos_frontier.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/ sources.lock.json
          if git diff --staged --quiet; then
            echo "Generated artifacts unchanged."
          else
            git commit -m "chore: refresh audit ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push
          fi
