# Human judgments that cannot be inferred from upstream machine-readable indexes.
# Buckets here override the computed bucket unless FC already has a formal_proof link.
#
# An entry MAY also carry an optional `verdict:` key (faithful | variant | unfaithful)
# when the judgment is specifically a statement-fidelity verdict. These are kept here
# as human-readable mirrors; `compile_overrides_to_attestations.py` turns each into a
# `vela attest faithfulness ...` command a human signs. The signed feed
# (fidelity_cache.json / the hub snapshot) is the authority once present.

